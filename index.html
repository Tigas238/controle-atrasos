<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="manifest" href="manifest.json">

<title>Controle de Atrasos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
background:#f2f3f5;
padding:15px;
color:#111;
}

.topo{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.menu-btn{
background:#2c3e50;
color:white;
border:none;
width:45px;
height:45px;
border-radius:10px;
font-size:22px;
}

h1{
font-size:34px;
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:white;
box-shadow:5px 0 15px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
z-index:1000;
overflow:auto;
}

.sidebar.active{
left:0;
}

.sidebar h2{
margin-bottom:20px;
}

.mes-item{
padding:12px;
background:#f3f3f3;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.inputs{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.input-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:5px;
font-weight:600;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.botoes{
display:flex;
gap:10px;
margin-top:20px;
}

button{
border:none;
padding:14px;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
flex:1;
}

.reset{
background:#e74c3c;
color:white;
}

.info{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:18px;
font-weight:bold;
}

.progress{
height:18px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:#27ae60;
width:0%;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
padding:12px 5px;
font-size:14px;
border-bottom:2px solid #eee;
}

td{
padding:14px 5px;
text-align:center;
border-bottom:1px solid #eee;
font-size:14px;
}

.delete{
background:#ff4d4d;
color:white;
width:40px;
height:40px;
border-radius:10px;
}

@media(max-width:700px){

.inputs{
grid-template-columns:1fr;
}

table{
font-size:12px;
}

th,td{
padding:8px 2px;
}

h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h2>Meses</h2>

<div id="listaMeses"></div>

</div>

<div class="topo">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<h1>Controle de Atrasos</h1>

</div>

<div class="card">

<div class="inputs">

<div class="input-group">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="input-group">
<label>Hora entrada</label>
<input type="time" id="entrada">
</div>

<div class="input-group">
<label>Saída almoço</label>
<input type="time" id="saida">
</div>

<div class="input-group">
<label>Volta almoço</label>
<input type="time" id="volta">
</div>

<div class="input-group">
<label>Tempo almoço permitido (min)</label>
<input type="number" id="almocoPermitido" value="60">
</div>

</div>

<div class="botoes">

<button class="add" onclick="adicionar()">
Adicionar
</button>

<button class="reset" onclick="resetar()">
Zerar
</button>

</div>

</div>

<div class="card">

<div class="info">

<div id="totalMes">
Total: 0 min
</div>

<div id="restante">
Restam: 90 min
</div>

</div>

<div class="progress">
<div class="bar" id="barra"></div>
</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Volta</th>
<th>Total</th>
<th></th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

document.getElementById("data").valueAsDate = new Date()

let limite = 90

function chaveMes(){

let data = document.getElementById("data").value

if(!data){

let hoje = new Date()

return hoje.getFullYear()+"-"+String(hoje.getMonth()+1).padStart(2,"0")

}

return data.slice(0,7)

}

function pegarRegistros(){

return JSON.parse(localStorage.getItem(chaveMes())) || []

}

function salvarRegistros(registros){

localStorage.setItem(chaveMes(), JSON.stringify(registros))

}

function calcularMinutos(hora){

let [h,m] = hora.split(":")

return Number(h)*60 + Number(m)

}

function calcularAtraso(entrada, saida, volta, permitido){

let atrasoEntrada = calcularMinutos(entrada) - calcularMinutos("08:00")

if(atrasoEntrada < 0) atrasoEntrada = 0

let tempoAlmoco = calcularMinutos(volta) - calcularMinutos(saida)

let atrasoAlmoco = tempoAlmoco - permitido

if(atrasoAlmoco < 0) atrasoAlmoco = 0

return atrasoEntrada + atrasoAlmoco

}

function atualizar(){

let registros = pegarRegistros()

let tabela = document.getElementById("tabela")

tabela.innerHTML = ""

let total = 0

registros.forEach((r,i)=>{

total += r.total

tabela.innerHTML += `

<tr>

<td>${r.data}</td>
<td>${r.entrada}</td>
<td>${r.saida}</td>
<td>${r.volta}</td>
<td>${r.total} min</td>

<td>

<button class="delete" onclick="remover(${i})">

X

</button>

</td>

</tr>

`

})

document.getElementById("totalMes").innerText =
"Total: "+total+" min"

document.getElementById("restante").innerText =
"Restam: "+(limite-total)+" min"

let porcentagem = (total/limite)*100

document.getElementById("barra").style.width =
porcentagem+"%"

if(total > limite){

document.getElementById("barra").style.background =
"#ff4d4d"

}

carregarMeses()

}

function adicionar(){

let data = document.getElementById("data").value

let entrada = document.getElementById("entrada").value

let saida = document.getElementById("saida").value

let volta = document.getElementById("volta").value

let permitido =
Number(document.getElementById("almocoPermitido").value)

if(!data || !entrada || !saida || !volta){

alert("Preencha tudo")

return

}

let total = calcularAtraso(
entrada,
saida,
volta,
permitido
)

let registros = pegarRegistros()

registros.push({
data,
entrada,
saida,
volta,
total
})

salvarRegistros(registros)

atualizar()

}

function remover(i){

let registros = pegarRegistros()

registros.splice(i,1)

salvarRegistros(registros)

atualizar()

}

function resetar(){

if(confirm("Apagar registros deste mês?")){

localStorage.removeItem(chaveMes())

atualizar()

}

}

function carregarMeses(){

let lista = document.getElementById("listaMeses")

lista.innerHTML = ""

Object.keys(localStorage).forEach(chave=>{

if(chave.includes("-")){

lista.innerHTML += `

<div class="mes-item" onclick="abrirMes('${chave}')">

${chave}

</div>

`

}

})

}

function abrirMes(chave){

let registros = JSON.parse(localStorage.getItem(chave)) || []

let tabela = document.getElementById("tabela")

tabela.innerHTML = ""

let total = 0

registros.forEach((r,i)=>{

total += r.total

tabela.innerHTML += `

<tr>

<td>${r.data}</td>
<td>${r.entrada}</td>
<td>${r.saida}</td>
<td>${r.volta}</td>
<td>${r.total} min</td>

<td>

<button class="delete" onclick="remover(${i})">

X

</button>

</td>

</tr>

`

})

document.getElementById("totalMes").innerText =
"Total: "+total+" min"

document.getElementById("restante").innerText =
"Restam: "+(limite-total)+" min"

}

function toggleMenu(){

document.getElementById("sidebar")
.classList.toggle("active")

}

atualizar()

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
